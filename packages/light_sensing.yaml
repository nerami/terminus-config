template:
  - binary_sensor:
      - name: 'Is Dark'
        unique_id: is_dark
        icon: mdi:weather-night
        state: >-
          {% set lux = states('sensor.light_sensor_samsung_illuminance') %}
          {% if lux in ['unknown', 'unavailable'] %}
            {{ is_state('sun.sun', 'below_horizon') }}
          {% else %}
            {% set lux = lux | float %}
            {% set was_on = is_state('binary_sensor.is_dark', 'on') %}
            {{ lux < 30 if was_on else lux < 20 }}
          {% endif %}

      - name: 'Is Bright'
        unique_id: is_bright
        icon: mdi:weather-sunny
        state: >-
          {% set lux = states('sensor.light_sensor_samsung_illuminance') %}
          {% if lux in ['unknown', 'unavailable'] %}
            {{ is_state('sun.sun', 'above_horizon') }}
          {% else %}
            {% set lux = lux | float %}
            {% set was_on = is_state('binary_sensor.is_bright', 'on') %}
            {{ lux >= 20 if was_on else lux >= 30 }}
          {% endif %}
