template:
  - binary_sensor:
      - name: 'LR: Is Dark'
        unique_id: lr_is_dark
        icon: mdi:weather-night
        state: >-
          {% set lux = states('sensor.lr_light_sensor_illuminance') %}
          {% if lux in ['unknown', 'unavailable'] %}
            {{ is_state('sun.sun', 'below_horizon') }}
          {% else %}
            {% set lux = lux | float %}
            {% set was_on = is_state('binary_sensor.lr_is_dark', 'on') %}
            {{ lux < 30 if was_on else lux < 20 }}
          {% endif %}

      - name: 'MB: Is Dark'
        unique_id: mb_is_dark
        icon: mdi:weather-night
        state: >-
          {% set lux = states('sensor.mb_light_sensor_illuminance') %}
          {% if lux in ['unknown', 'unavailable'] %}
            {{ is_state('sun.sun', 'below_horizon') }}
          {% else %}
            {% set lux = lux | float %}
            {% set was_on = is_state('binary_sensor.mb_is_dark', 'on') %}
            {{ lux < 30 if was_on else lux < 20 }}
          {% endif %}

      - name: 'Kitchen: Is Dark'
        unique_id: kitchen_is_dark
        icon: mdi:weather-night
        availability: "{{ states('binary_sensor.lr_is_dark') not in ['unknown', 'unavailable'] }}"
        state: "{{ is_state('binary_sensor.lr_is_dark', 'on') }}"

      - name: 'Abi: Is Dark'
        unique_id: abi_is_dark
        icon: mdi:weather-night
        availability: "{{ states('binary_sensor.mb_is_dark') not in ['unknown', 'unavailable'] }}"
        state: "{{ is_state('binary_sensor.mb_is_dark', 'on') }}"

      - name: 'Is Bright'
        unique_id: is_bright
        icon: mdi:weather-sunny
        state: >-
          {% set lux = states('sensor.lr_light_sensor_illuminance') %}
          {% if lux in ['unknown', 'unavailable'] %}
            {{ is_state('sun.sun', 'above_horizon') }}
          {% else %}
            {% set lux = lux | float %}
            {% set was_on = is_state('binary_sensor.is_bright', 'on') %}
            {{ lux >= 20 if was_on else lux >= 30 }}
          {% endif %}
