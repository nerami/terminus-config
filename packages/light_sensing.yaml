template:
  - binary_sensor:
      - name: 'LR: Is Dark'
        unique_id: lr_is_dark
        icon: mdi:weather-night
        state: >-
          {% import 'is_dark.jinja' as is_dark %}
          {{ is_dark.lux_is_dark('sensor.lr_light_sensor_illuminance', 'binary_sensor.lr_is_dark') }}

      - name: 'MB: Is Dark'
        unique_id: mb_is_dark
        icon: mdi:weather-night
        state: >-
          {% import 'is_dark.jinja' as is_dark %}
          {{ is_dark.lux_is_dark('sensor.mb_light_sensor_illuminance', 'binary_sensor.mb_is_dark') }}

      - name: 'Kitchen: Is Dark'
        unique_id: kitchen_is_dark
        icon: mdi:weather-night
        state: >-
          {% import 'is_dark.jinja' as is_dark %}
          {{ is_dark.lux_is_dark('sensor.lr_light_sensor_illuminance', 'binary_sensor.kitchen_is_dark') }}

      - name: 'Abi: Is Dark'
        unique_id: abi_is_dark
        icon: mdi:weather-night
        state: >-
          {% import 'is_dark.jinja' as is_dark %}
          {{ is_dark.lux_is_dark('sensor.mb_light_sensor_illuminance', 'binary_sensor.abi_is_dark') }}
