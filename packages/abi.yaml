automation:
  - id: '1772400006000'
    alias: 'Abi: Auto Scene'
    description: >-
      Apply Bright or Dim when an Abi light turns on or when
      ambient light crosses the is_dark hysteresis band.
      binary_sensor.abi_is_dark aliases MB's lux sensor since Abi has
      no illuminance sensor of its own — see light_sensing.yaml.
    use_blueprint:
      path: terminus/auto_scene.yaml
      input:
        lights:
          - light.abi_led_one
          - light.abi_led_two
        dark_sensor: binary_sensor.abi_is_dark
        dim_scene: scene.abi_dim
        bright_scene: scene.abi_bright

scene:
  - id: '1772400007000'
    name: 'Abi: Redish'
    icon: mdi:fire-circle
    entities:
      light.abi_led_one:
        state: 'on'
        brightness: 255
        hs_color: [9, 100]
      light.abi_led_two:
        state: 'on'
        brightness: 255
        hs_color: [9, 100]

  - id: '1772400008000'
    name: 'Abi: Bluish'
    icon: mdi:shield-moon
    entities:
      light.abi_led_one:
        state: 'on'
        brightness: 255
        hs_color: [217, 100]
      light.abi_led_two:
        state: 'on'
        brightness: 255
        hs_color: [217, 100]

  - id: '1772400009000'
    name: 'Abi: Bright'
    icon: mdi:shield-sun
    entities:
      light.abi_led_one:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6500
      light.abi_led_two:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6500

  - id: '1772400010000'
    name: 'Abi: Dim'
    icon: mdi:lightbulb-night
    entities:
      light.abi_led_one:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
      light.abi_led_two:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
