notify_events:
  token: !secret notify_events_token

# Telegram bot configured via UI flow (Settings -> Devices & Services -> Add
# Integration -> Telegram Bot). Polling mode; credentials stored in the
# config entry, not in this file. Secrets `telegram_bot_token` and
# `telegram_chat_id` exist on the device only as a paste-source for the UI.

notify:
  - name: events
    platform: notify_events

counter:
  ha_error_count:
    name: HA Error Count
    initial: 0
    restore: true

input_text:
  ha_error_last:
    name: HA Error Last
    max: 255

automation:
  - id: notify_calendar_reminder
    alias: 'Notify: calendar reminder fires'
    description: Send Telegram alert when a Reminders event starts.
    triggers:
      - trigger: calendar.event_started
        target:
          entity_id: calendar.reminders
        options:
          offset:
            days: 0
            hours: 0
            minutes: 0
            seconds: 0
          offset_type: after
    actions:
      - variables:
          ev: "{{ trigger.get('calendar_event', {}) if trigger is defined else {} }}"
          summary: "{{ ev.get('summary') or 'Reminder' }}"
          body: "{{ ev.get('description') or 'Event ongoing — check calendar for details.' }}"
          uid: "{{ ev.get('uid') or now().timestamp() | int }}"
      - action: notify.send_message
        target:
          entity_id: notify.notifications_norman_r
        data:
          title: "Reminder: {{ summary }}"
          message: "{{ body }}"
      - action: persistent_notification.create
        data:
          title: "📅 {{ summary }}"
          message: "{{ body }}"
          notification_id: "cal_{{ uid }}"
    mode: parallel
    max: 10

  - id: notify_calendar_event_created
    alias: 'Notify: calendar event created'
    description: Send Telegram alert when a new event is added to calendar.reminders.
    triggers:
      - trigger: event
        event_type: call_service
        event_data:
          domain: calendar
          service: create_event
    conditions:
      - condition: template
        value_template: >-
          {% set evd = trigger.event.data if (trigger is defined and trigger.event is defined) else {} %}
          {% set sd = evd.get('service_data', {}) %}
          {% set tg = evd.get('target', {}) %}
          {{ sd.get('entity_id') == 'calendar.reminders'
             or tg.get('entity_id') == 'calendar.reminders' }}
    actions:
      - variables:
          evd: "{{ trigger.event.data if (trigger is defined and trigger.event is defined) else {} }}"
          sd: "{{ evd.get('service_data', {}) }}"
          summary: "{{ sd.get('summary') or '(no title)' }}"
          start: "{{ sd.get('dtstart') or '?' }}"
          end: "{{ sd.get('dtend') or '?' }}"
          notes: "{{ sd.get('description') or '' }}"
      - action: notify.send_message
        target:
          entity_id: notify.notifications_norman_r
        data:
          title: "Calendar: new event — {{ summary }}"
          message: |-
            {{ start }} → {{ end }}
            {%- if notes %}
            {{ notes }}
            {%- endif %}
    mode: parallel
    max: 10

  - id: notify_calendar_event_updated
    alias: 'Notify: calendar event updated'
    description: Send Telegram alert when an event in calendar.reminders is edited.
    triggers:
      - trigger: event
        event_type: call_service
        event_data:
          domain: calendar
          service: update_event
    conditions:
      - condition: template
        value_template: >-
          {% set evd = trigger.event.data if (trigger is defined and trigger.event is defined) else {} %}
          {% set sd = evd.get('service_data', {}) %}
          {% set tg = evd.get('target', {}) %}
          {{ sd.get('entity_id') == 'calendar.reminders'
             or tg.get('entity_id') == 'calendar.reminders' }}
    actions:
      - variables:
          evd: "{{ trigger.event.data if (trigger is defined and trigger.event is defined) else {} }}"
          sd: "{{ evd.get('service_data', {}) }}"
          ev: "{{ sd.get('event', {}) }}"
          summary: "{{ ev.get('summary') or sd.get('summary') or '(no title)' }}"
          uid: "{{ sd.get('uid') or '?' }}"
          start: "{{ ev.get('dtstart') or sd.get('dtstart') or '?' }}"
          end: "{{ ev.get('dtend') or sd.get('dtend') or '?' }}"
      - action: notify.send_message
        target:
          entity_id: notify.notifications_norman_r
        data:
          title: "Calendar: updated — {{ summary }}"
          message: |-
            {{ start }} → {{ end }}
            uid: {{ uid }}
    mode: parallel
    max: 10

  - id: notify_calendar_event_deleted
    alias: 'Notify: calendar event deleted'
    description: Send Telegram alert when an event is removed from calendar.reminders.
    triggers:
      - trigger: event
        event_type: call_service
        event_data:
          domain: calendar
          service: delete_event
    conditions:
      - condition: template
        value_template: >-
          {% set evd = trigger.event.data if (trigger is defined and trigger.event is defined) else {} %}
          {% set sd = evd.get('service_data', {}) %}
          {% set tg = evd.get('target', {}) %}
          {{ sd.get('entity_id') == 'calendar.reminders'
             or tg.get('entity_id') == 'calendar.reminders' }}
    actions:
      - variables:
          evd: "{{ trigger.event.data if (trigger is defined and trigger.event is defined) else {} }}"
          sd: "{{ evd.get('service_data', {}) }}"
          uid: "{{ sd.get('uid') or '?' }}"
          recurrence_id: "{{ sd.get('recurrence_id') or '' }}"
          recurrence_range: "{{ sd.get('recurrence_range') or '' }}"
      - action: notify.send_message
        target:
          entity_id: notify.notifications_norman_r
        data:
          title: "Calendar: event deleted"
          message: |-
            uid: {{ uid }}
            {%- if recurrence_id %}
            recurrence: {{ recurrence_id }} ({{ recurrence_range or 'single' }})
            {%- endif %}
    mode: parallel
    max: 10

  - id: telegram_remind_nl
    alias: 'Telegram: /remind natural language → Claude'
    description: >-
      Forward /remind free text to conversation.claude_conversation; agent
      creates an event on calendar.reminders via Assist tools.
    triggers:
      - trigger: event
        event_type: telegram_command
        event_data:
          command: /remind
    variables:
      raw: "{{ trigger.event.data.args | join(' ') }}"
      chat_id: "{{ trigger.event.data.chat_id }}"
      prompt: >-
        Create a calendar event on calendar.reminders.
        Today: {{ now().strftime('%A, %Y-%m-%d') }}, current time {{ now().strftime('%H:%M') }} (UTC-6, Costa Rica, no DST).
        Default duration: 1 hour if not specified.
        Household vocabulary: "my daughter", "Nanis", "Abi", and "Abril" all refer to Abril Ramírez.
        After creating, reply with one short confirmation line: title + local start time.
        User request: {{ raw }}
    conditions:
      - condition: template
        value_template: "{{ raw | length > 0 }}"
    actions:
      - action: conversation.process
        data:
          agent_id: conversation.claude_conversation
          text: "{{ prompt }}"
        response_variable: reply
      - action: telegram_bot.send_message
        data:
          chat_id: "{{ chat_id }}"
          message: "{{ reply.response.speech.plain.speech }}"
    mode: parallel
    max: 5

  - id: telegram_remind_help
    alias: 'Telegram: /remind empty input → usage'
    triggers:
      - trigger: event
        event_type: telegram_command
        event_data:
          command: /remind
    conditions:
      - condition: template
        value_template: "{{ (trigger.event.data.args | join(' ')) | length == 0 }}"
    actions:
      - action: telegram_bot.send_message
        data:
          chat_id: "{{ trigger.event.data.chat_id }}"
          message: |
            Usage: /remind <plain English>
            Examples:
              /remind dentist Friday 9am for 90 min
              /remind pickup Nanis today 5:30pm
              /remind block 2 hours Thursday afternoon

  - id: notify_ha_error_record
    alias: 'Notify: log automation/script/scene error'
    description: >-
      Records every ERROR-level log from automation, script, or scene
      execution into counter.ha_error_count / input_text.ha_error_last.
      Paired with notify_ha_error_send, which throttles the actual Telegram
      alert to one per 2-minute window.
    triggers:
      - trigger: event
        event_type: system_log_event
    conditions:
      - condition: template
        value_template: >-
          {% set d = trigger.event.data %}
          {% set msg = (d.message | join(' ') if d.message is iterable and d.message is not string else d.message) | default('', true) %}
          {{ d.level == 'ERROR' and (
               d.name.startswith('homeassistant.components.automation')
               or d.name.startswith('homeassistant.components.script')
               or d.name.startswith('homeassistant.components.scene')
               or d.name.startswith('homeassistant.helpers.script')
             )
             and 'telegram' not in msg | lower
             and 'telegram' not in d.name | lower }}
    actions:
      - action: counter.increment
        target:
          entity_id: counter.ha_error_count
      - variables:
          d: "{{ trigger.event.data }}"
          msg: "{{ d.message | join(' ') if d.message is iterable and d.message is not string else d.message }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.ha_error_last
        data:
          value: "{{ (d.name ~ ': ' ~ msg) | truncate(250, True, '', 0) }}"
    mode: queued
    max: 20

  - id: notify_ha_error_send
    alias: 'Notify: automation/script/scene error (throttled send)'
    description: >-
      Fires on the same errors as notify_ha_error_record. mode: single means
      retriggers during the 2-min delay are ignored by the automation engine
      instead of restarting it — so this sends one Telegram summary per
      throttle window, ~2 min after the first error in a burst, no matter
      how many more errors land in between.
    triggers:
      - trigger: event
        event_type: system_log_event
    conditions:
      - condition: template
        value_template: >-
          {% set d = trigger.event.data %}
          {% set msg = (d.message | join(' ') if d.message is iterable and d.message is not string else d.message) | default('', true) %}
          {{ d.level == 'ERROR' and (
               d.name.startswith('homeassistant.components.automation')
               or d.name.startswith('homeassistant.components.script')
               or d.name.startswith('homeassistant.components.scene')
               or d.name.startswith('homeassistant.helpers.script')
             )
             and 'telegram' not in msg | lower
             and 'telegram' not in d.name | lower }}
    actions:
      - delay: '00:02:00'
      - action: telegram_bot.send_message
        data:
          chat_id: !secret telegram_chat_id
          message: >-
            ⚠️ {{ states('counter.ha_error_count') }} automation/script/scene
            error(s) in the last 2 min. Most recent:
            {{ states('input_text.ha_error_last') }}
      - action: counter.reset
        target:
          entity_id: counter.ha_error_count
    mode: single
    max_exceeded: silent
