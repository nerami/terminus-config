notify_events:
  token: !secret notify_events_token

# Telegram bot configured via UI flow (Settings -> Devices & Services -> Add
# Integration -> Telegram Bot). Polling mode; credentials stored in the
# config entry, not in this file. Secrets `telegram_bot_token` and
# `telegram_chat_id` exist on the device only as a paste-source for the UI.

notify:
  - name: events
    platform: notify_events

automation:
  - id: notify_mb_lamp_on
    alias: "Notify: MB Lamp turned on"
    description: Smoke test for the Notify.Events channel.
    mode: single
    trigger:
      - platform: state
        entity_id: switch.mb_lamp
        from: "off"
        to: "on"
    action:
      - service: notify.events
        data:
          title: "MB: Lamp on"
          message: "MB Lamp switched on at {{ now().strftime('%H:%M:%S') }}."
          data:
            level: info
            priority: normal

  - id: notify_calendar_reminder
    alias: 'Notify: calendar reminder fires'
    description: Send Telegram alert when a Reminders event starts.
    triggers:
      - event: start
        entity_id: calendar.reminders
        trigger: calendar
    actions:
      - data:
          level: warning
          message: CAL TRIGGER DUMP keys={{ trigger.keys() | list }} raw={{ trigger |
            tojson }}
        action: system_log.write
      - data:
          title: Reminder
          message: "{{ (trigger.calendar_event.description or 'Reminder time.')\n   if
            trigger is defined\n   and trigger is mapping\n   and trigger.get('calendar_event')\n
            \  else 'Reminder time.' }}"
        action: notify.send_message
        target:
          entity_id: notify.ha_reminders_norman_r
    mode: parallel
    max: 10
