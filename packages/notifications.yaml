notify_events:
  token: !secret notify_events_token

telegram_bot:
  - platform: polling
    api_key: !secret telegram_bot_token
    allowed_chat_ids:
      - !secret telegram_chat_id

notify:
  - name: events
    platform: notify_events

automation:
  - id: notify_mb_lamp_on
    alias: "Notify: MB Lamp turned on"
    description: Smoke test for the Notify.Events channel.
    mode: single
    trigger:
      - platform: state
        entity_id: switch.mb_lamp
        from: "off"
        to: "on"
    action:
      - service: notify.events
        data:
          title: "MB: Lamp on"
          message: "MB Lamp switched on at {{ now().strftime('%H:%M:%S') }}."
          data:
            level: info
            priority: normal

  - id: notify_calendar_reminder
    alias: "Notify: calendar reminder fires"
    description: Send Telegram alert when a Reminders event starts.
    mode: parallel
    max: 10
    trigger:
      - platform: calendar
        event: start
        entity_id: calendar.reminders
    action:
      - service: telegram_bot.send_message
        data:
          target: !secret telegram_chat_id
          title: "⏰ {{ trigger.calendar_event.summary }}"
          parse_mode: html
          message: >-
            {{ trigger.calendar_event.description
               if trigger.calendar_event.description
               else 'Reminder time.' }}
