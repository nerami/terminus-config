automation:
  - id: '1771035434876'
    alias: Turn off the lights at 10pm
    triggers:
      - trigger: time
        at: '22:00:00'
        weekday:
          - sun
          - mon
          - tue
          - wed
          - thu
          - fri
          - sat
    actions:
      - action: light.turn_off
        target:
          label_id: light
      - action: switch.turn_off
        target:
          label_id:
            - light
            - socket
    mode: single
