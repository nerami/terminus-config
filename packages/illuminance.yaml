automation:
  - id: sockets_illuminance_control
    alias: 'Sockets: Illuminance Control'
    description: >-
      Turn on Terminus sockets and yard switch when illuminance is below 25 lx
      for at least 1 minute; turn off when it is 25 lx or higher for at least
      1 minute. The 1-minute hold debounces sensor jitter near the threshold.
    triggers:
      - trigger: numeric_state
        entity_id: sensor.light_sensor_samsung_illuminance
        below: 25
        for: '00:01:00'
        id: low_light
      - trigger: numeric_state
        entity_id: sensor.light_sensor_samsung_illuminance
        above: 24
        for: '00:01:00'
        id: bright_light
    conditions:
      - condition: time
        after: '06:00:00'
        before: '22:00:00'
      - condition: zone
        entity_id: person.norman_ramirez
        zone: zone.home
    actions:
      - choose:
          - conditions:
              - condition: trigger
                id: low_light
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.sockets
          - conditions:
              - condition: trigger
                id: bright_light
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.sockets
    mode: single

scene:
  - id: '1771384085759'
    name: 'Low Lights: Off'
    icon: mdi:lightbulb-night-outline
    entities:
      switch.sockets:
        state: 'on'

  - id: '1771384324468'
    name: 'Sockets: Off'
    icon: mdi:lamps-outline
    entities:
      switch.sockets:
        state: 'off'
