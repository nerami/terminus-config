automation:
  - id: sockets_illuminance_control
    alias: 'Sockets: Illuminance Control'
    description: >-
      Turn Terminus sockets on when the room is dark and off when bright,
      gated by binary_sensor.is_dark (20/30 lux hysteresis band + sun
      fallback when the lux sensor is offline). A 10-second hold debounces
      brief state flickers.
    triggers:
      - trigger: state
        entity_id: binary_sensor.is_dark
        to: 'on'
        for: '00:00:10'
        id: low_light
      - trigger: state
        entity_id: binary_sensor.is_dark
        to: 'off'
        for: '00:00:10'
        id: bright_light
    conditions:
      - condition: time
        after: '06:00:00'
        before: '22:00:00'
      - condition: zone
        entity_id: person.norman_ramirez
        zone: zone.home
    actions:
      - choose:
          - conditions:
              - condition: trigger
                id: low_light
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.sockets
          - conditions:
              - condition: trigger
                id: bright_light
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.sockets
    mode: single

scene:
  - id: '1771384085759'
    name: 'Low Lights: Off'
    icon: mdi:lightbulb-night-outline
    entities:
      switch.sockets:
        state: 'on'

  - id: '1771384324468'
    name: 'Sockets: Off'
    icon: mdi:lamps-outline
    entities:
      switch.sockets:
        state: 'off'
