switch:
  - platform: group
    name: Sockets
    unique_id: sockets
    entities:
      - switch.mb_lamp_socket
      - switch.lr_lamp_socket
      - switch.abi_desk_lamp_socket
      - switch.yard_string_lights_socket

automation:
  - id: lr_illuminance_control
    alias: 'LR: Illuminance Control'
    description: >-
      Turn LR's lamp socket on when the room is dark and off when bright,
      gated by binary_sensor.lr_is_dark. A 10-second hold debounces brief
      state flickers.
    use_blueprint:
      path: terminus/illuminance_switch_control.yaml
      input:
        dark_sensor: binary_sensor.lr_is_dark
        target_switch: switch.lr_lamp_socket

  - id: mb_illuminance_control
    alias: 'MB: Illuminance Control'
    description: >-
      Turn MB's lamp socket on when the room is dark and off when bright,
      gated by binary_sensor.mb_is_dark. A 10-second hold debounces brief
      state flickers.
    use_blueprint:
      path: terminus/illuminance_switch_control.yaml
      input:
        dark_sensor: binary_sensor.mb_is_dark
        target_switch: switch.mb_lamp_socket

  - id: abi_illuminance_control
    alias: 'Abi: Illuminance Control'
    description: >-
      Turn Abi's desk lamp socket on when the room is dark and off when
      bright, gated by binary_sensor.abi_is_dark. A 10-second hold
      debounces brief state flickers.
    use_blueprint:
      path: terminus/illuminance_switch_control.yaml
      input:
        dark_sensor: binary_sensor.abi_is_dark
        target_switch: switch.abi_desk_lamp_socket

  - id: yard_illuminance_control
    alias: 'Yard: Illuminance Control'
    description: >-
      Turn the yard string lights socket on when it's dark and off when
      bright, gated by binary_sensor.yard_is_dark (pure sun-elevation
      state — Yard has no illuminance sensor).
    use_blueprint:
      path: terminus/illuminance_switch_control.yaml
      input:
        dark_sensor: binary_sensor.yard_is_dark
        target_switch: switch.yard_string_lights_socket

scene:
  - id: '1771384324468'
    name: 'Sockets: Off'
    icon: mdi:lamps-outline
    entities:
      switch.sockets:
        state: 'off'
