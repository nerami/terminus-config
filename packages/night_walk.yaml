automation:
  - id: '1771080002196'
    alias: Night Walk
    description: ''
    triggers:
      - trigger: state
        entity_id:
          - switch.abi_desk_lamp_socket
          - switch.mb_lamp_socket
        to: 'on'
    conditions:
      - condition: time
        after: '00:00:00'
        before: '05:00:00'
    actions:
      - action: switch.turn_on
        target:
          entity_id: switch.lr_lamp_socket
    mode: single

  - id: '1771080220247'
    alias: 'Night Walk: Off'
    description: >-
      Turn off the living-room lamp only once both source switches
      (abi_desk_lamp_socket and mb_lamp_socket) are off. Prevents
      lr_lamp_socket going dark while one of the night-walk sources is
      still active.
    triggers:
      - trigger: state
        entity_id:
          - switch.abi_desk_lamp_socket
          - switch.mb_lamp_socket
        to: 'off'
    conditions:
      - condition: time
        after: '00:00:00'
        before: '05:00:00'
      - condition: template
        value_template: >-
          {{ is_state('switch.abi_desk_lamp_socket', 'off')
             and is_state('switch.mb_lamp_socket', 'off') }}
    actions:
      - action: switch.turn_off
        target:
          entity_id: switch.lr_lamp_socket
    mode: single
