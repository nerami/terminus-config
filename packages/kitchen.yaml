automation:
  - id: '1772400001000'
    alias: 'Kitchen: Auto Scene'
    description: >-
      Apply Day Light or Dim when a kitchen light turns on or when
      ambient light crosses the is_dark hysteresis band. Shares LR's
      lux sensor since Kitchen has no illuminance sensor of its own.
    use_blueprint:
      path: terminus/auto_scene.yaml
      input:
        lights:
          - light.kitchen_lobby
          - light.kitchen_counter
          - light.kitchen_led_one
          - light.kitchen_led_two
        dark_sensor: binary_sensor.lr_is_dark
        dim_scene: scene.kitchen_dim
        day_light_scene: scene.kitchen_day_light

scene:
  - id: '1772400002000'
    name: 'Kitchen: Redish'
    icon: mdi:fire-circle
    entities:
      light.kitchen_lobby:
        state: 'on'
        brightness: 255
        hs_color: [9, 100]
      light.kitchen_counter:
        state: 'on'
        brightness: 255
        hs_color: [9, 100]
      light.kitchen_led_one:
        state: 'on'
        brightness: 255
        hs_color: [9, 100]
      light.kitchen_led_two:
        state: 'on'
        brightness: 255
        hs_color: [9, 100]

  - id: '1772400003000'
    name: 'Kitchen: Bluish'
    icon: mdi:shield-moon
    entities:
      light.kitchen_lobby:
        state: 'on'
        brightness: 255
        hs_color: [217, 100]
      light.kitchen_counter:
        state: 'on'
        brightness: 255
        hs_color: [217, 100]
      light.kitchen_led_one:
        state: 'on'
        brightness: 255
        hs_color: [217, 100]
      light.kitchen_led_two:
        state: 'on'
        brightness: 255
        hs_color: [217, 100]

  - id: '1772400004000'
    name: 'Kitchen: Day Light'
    icon: mdi:shield-sun
    entities:
      light.kitchen_lobby:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6500
      light.kitchen_counter:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6500
      light.kitchen_led_one:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6500
      light.kitchen_led_two:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6500

  - id: '1772400005000'
    name: 'Kitchen: Dim'
    icon: mdi:lightbulb-night
    entities:
      light.kitchen_lobby:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
      light.kitchen_counter:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
      light.kitchen_led_one:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
      light.kitchen_led_two:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
