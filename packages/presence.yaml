group:
  family_trackers:
    name: Family Trackers
    entities:
      - device_tracker.normans_iphone
      - device_tracker.nanis_iphone

automation:
  - id: '1771029405189'
    alias: Turn off lights when everyone leaves
    triggers:
      - trigger: zone
        entity_id: group.family_trackers
        zone: zone.home
        event: leave
    actions:
      - action: light.turn_off
        target:
          label_id: light
      - action: switch.turn_off
        target:
          label_id: socket
    mode: single

  - id: '1771029768568'
    alias: Turn on the lights when someone gets home
    triggers:
      - trigger: zone
        entity_id: device_tracker.normans_iphone
        zone: zone.home
        event: enter
    conditions:
      - condition: state
        entity_id: binary_sensor.lr_is_dark
        state: 'on'
    actions:
      - action: switch.turn_on
        target:
          label_id: lamp
    mode: single
