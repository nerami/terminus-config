automation:
  - id: '1771080380126'
    alias: 'MB: Auto Scene'
    description: >-
      Apply Day Light or Dim when a bedroom light turns on or when
      ambient light crosses the is_dark hysteresis band, unless the
      TV is playing.
    use_blueprint:
      path: terminus/auto_scene.yaml
      input:
        lights:
          - light.mb_led_one
          - light.mb_led_two
        dark_sensor: binary_sensor.mb_is_dark
        dim_scene: scene.mb_dim
        day_light_scene: scene.mb_day_light
        tv_players:
          - media_player.mb_tv

  - id: '1771085036395'
    alias: 'MB: TV Scene'
    description: >-
      Apply Redish when the TV powers on, or Dim when it powers off for
      30s. Only between sunset and sunrise. Dim branch is also gated by
      time<22:00 so night-walk keeps control after 22:00.
    use_blueprint:
      path: terminus/tv_scene.yaml
      input:
        tv_players:
          - media_player.mb_tv
        redish_scene: scene.mb_redish
        dim_scene: scene.mb_dim

scene:
  - id: '1771077746684'
    name: 'MB: Bluish'
    icon: mdi:shield-moon
    entities:
      light.mb_led_one:
        state: 'on'
        brightness: 255
        hs_color: [216, 100]
      light.mb_led_two:
        state: 'on'
        brightness: 255
        hs_color: [216, 100]

  - id: '1771077823140'
    name: 'MB: Redish'
    icon: mdi:fire-circle
    entities:
      light.mb_led_one:
        state: 'on'
        brightness: 255
        hs_color: [9, 100]
      light.mb_led_two:
        state: 'on'
        brightness: 255
        hs_color: [10, 100]

  - id: '1771078321508'
    name: 'MB: Day Light'
    icon: mdi:shield-sun
    entities:
      light.mb_led_one:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6500
      light.mb_led_two:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6500

  - id: '1771078606159'
    name: 'MB: Dim'
    icon: mdi:lightbulb-night
    entities:
      light.mb_led_one:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
      light.mb_led_two:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
