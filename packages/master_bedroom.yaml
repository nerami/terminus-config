automation:
  - id: '1771080380126'
    alias: 'MB: Auto Scene'
    description: >-
      Apply Day Light or Dim when a bedroom light turns on or when
      ambient light crosses the is_dark hysteresis band, unless the
      TV is playing.
    triggers:
      - trigger: state
        entity_id:
          - light.mb_led_one
          - light.mb_led_two
        from: 'off'
        to: 'on'
      - trigger: state
        entity_id: binary_sensor.mb_is_dark
    conditions:
      - condition: or
        conditions:
          - condition: state
            entity_id: light.mb_led_one
            state: 'on'
          - condition: state
            entity_id: light.mb_led_two
            state: 'on'
      - condition: not
        conditions:
          - condition: state
            entity_id: media_player.mb_tv
            state: 'playing'
    actions:
      - delay: '00:00:03'
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.mb_is_dark
                state: 'on'
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: scene.mb_dim
          - conditions:
              - condition: state
                entity_id: binary_sensor.mb_is_dark
                state: 'off'
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: scene.mb_day_light
    mode: single

  - id: '1771085036395'
    alias: 'MB: TV Scene'
    description: >-
      Apply Redish when the TV powers on, or Dim when it powers off for
      30s. Only between sunset and sunrise. Dim branch is also gated by
      time<22:00 so night-walk keeps control after 22:00.
    triggers:
      - trigger: state
        entity_id: media_player.mb_tv
        from: 'off'
        not_to:
          - 'unavailable'
          - 'unknown'
        id: tv_on
      - trigger: state
        entity_id: media_player.mb_tv
        to: 'off'
        for: '00:00:30'
        id: tv_off
    conditions:
      - condition: sun
        before: sunrise
        after: sunset
    actions:
      - choose:
          - conditions:
              - condition: trigger
                id: tv_on
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: scene.mb_redish
          - conditions:
              - condition: trigger
                id: tv_off
              - condition: time
                before: '22:00:00'
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: scene.mb_dim
    mode: single

scene:
  - id: '1771077746684'
    name: 'MB: Bluish'
    icon: mdi:shield-moon
    entities:
      light.mb_led_one:
        state: 'on'
        brightness: 255
        hs_color: [216, 100]
      light.mb_led_two:
        state: 'on'
        brightness: 255
        hs_color: [216, 100]

  - id: '1771077823140'
    name: 'MB: Redish'
    icon: mdi:fire-circle
    entities:
      light.mb_led_one:
        state: 'on'
        brightness: 255
        hs_color: [9, 100]
      light.mb_led_two:
        state: 'on'
        brightness: 255
        hs_color: [10, 100]

  - id: '1771078321508'
    name: 'MB: Day Light'
    icon: mdi:shield-sun
    entities:
      light.mb_led_one:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6500
      light.mb_led_two:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6500

  - id: '1771078606159'
    name: 'MB: Dim'
    icon: mdi:lightbulb-night
    entities:
      light.mb_led_one:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
      light.mb_led_two:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
