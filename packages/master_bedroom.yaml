automation:
  - id: '1771080380126'
    alias: 'MB: Auto Daylight'
    description: ''
    triggers:
      - trigger: state
        entity_id:
          - light.mb_led_one
          - light.mb_led_two
        to: 'on'
    conditions:
      - condition: state
        entity_id: binary_sensor.is_bright
        state: 'on'
    actions:
      - action: scene.turn_on
        target:
          entity_id: scene.mb_day_light
    mode: single

  - id: '1771080435893'
    alias: 'MB: Auto Dim'
    description: ''
    triggers:
      - trigger: state
        entity_id:
          - light.mb_led_one
          - light.mb_led_two
        to: 'on'
    conditions:
      - condition: state
        entity_id: binary_sensor.is_dark
        state: 'on'
    actions:
      - action: scene.turn_on
        target:
          entity_id: scene.mb_dim
    mode: single

  - id: '1771085036395'
    alias: 'MB: TV Playing'
    description: ''
    triggers:
      - trigger: state
        entity_id: media_player.playstation_4_2
        to: 'playing'
    conditions:
      - condition: sun
        before: sunrise
        after: sunset
    actions:
      - action: scene.turn_on
        target:
          entity_id: scene.mb_redish
    mode: single

  - id: '1771085107419'
    alias: 'MB: Idle TV'
    triggers:
      - trigger: state
        entity_id:
          - media_player.playstation_4_2
        to:
          - 'off'
          - idle
          - unknown
          - unavailable
          - paused
          - standby
    conditions:
      - condition: sun
        before: sunrise
        after: sunset
      - condition: time
        before: '22:00:00'
    actions:
      - action: scene.turn_on
        target:
          entity_id: scene.mb_dim
    mode: single

scene:
  - id: '1771077746684'
    name: 'MB: Bluish'
    icon: mdi:shield-moon
    entities:
      light.mb_led_one:
        state: 'on'
        brightness: 255
        hs_color: [216, 100]
      light.mb_led_two:
        state: 'on'
        brightness: 255
        hs_color: [216, 100]

  - id: '1771077823140'
    name: 'MB: Redish'
    icon: mdi:fire-circle
    entities:
      light.mb_led_one:
        state: 'on'
        brightness: 255
        hs_color: [9, 100]
      light.mb_led_two:
        state: 'on'
        brightness: 255
        hs_color: [10, 100]

  - id: '1771078321508'
    name: 'MB: Day Light'
    icon: mdi:shield-sun
    entities:
      light.mb_led_one:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6535
      light.mb_led_two:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6535

  - id: '1771078606159'
    name: 'MB: Dim'
    icon: mdi:lightbulb-night
    entities:
      light.mb_led_one:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
      light.mb_led_two:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
