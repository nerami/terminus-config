automation:
  - id: '1771080638853'
    alias: 'LR: Auto Scene'
    description: >-
      Apply Day Light or Dim when a living-room light turns on or when
      ambient light crosses the is_dark hysteresis band, unless the TV
      is playing.
    triggers:
      - trigger: state
        entity_id:
          - light.living
          - light.dining
        from: 'off'
        to: 'on'
      - trigger: state
        entity_id: binary_sensor.is_dark
    conditions:
      - condition: or
        conditions:
          - condition: state
            entity_id: light.living
            state: 'on'
          - condition: state
            entity_id: light.dining
            state: 'on'
      - condition: template
        value_template: >-
          {{ not is_state('media_player.samsung', 'playing')
             and not is_state('media_player.samsung_cast', 'playing') }}
    actions:
      - delay: '00:00:03'
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.is_dark
                state: 'on'
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: scene.lr_dim
          - conditions:
              - condition: state
                entity_id: binary_sensor.is_dark
                state: 'off'
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: scene.lr_day_light
    mode: single

  - id: '1771090342172'
    alias: 'LR: TV Scene'
    description: >-
      Apply Redish when the TV powers on, or Dim when it powers off for
      30s. Only between sunset and sunrise. Dim branch is also gated by
      time<22:00 so night-walk keeps control after 22:00.
    triggers:
      - trigger: state
        entity_id:
          - media_player.samsung
          - media_player.samsung_cast
        from: 'off'
        not_to:
          - 'unavailable'
          - 'unknown'
        id: tv_on
      - trigger: state
        entity_id:
          - media_player.samsung
          - media_player.samsung_cast
        to: 'off'
        for: '00:00:30'
        id: tv_off
    conditions:
      - condition: sun
        before: sunrise
        after: sunset
    actions:
      - choose:
          - conditions:
              - condition: trigger
                id: tv_on
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: scene.lr_redish
          - conditions:
              - condition: trigger
                id: tv_off
              - condition: time
                before: '22:00:00'
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: scene.lr_dim
    mode: single

scene:
  - id: '1771077904382'
    name: 'LR: Redish'
    icon: mdi:fire-circle
    entities:
      light.living:
        state: 'on'
        brightness: 255
        hs_color: [9, 100]
      light.dining:
        state: 'on'
        brightness: 255
        hs_color: [9, 100]

  - id: '1771077995810'
    name: 'LR: Bluish'
    icon: mdi:shield-moon
    entities:
      light.dining:
        state: 'on'
        brightness: 255
        hs_color: [217, 100]
      light.living:
        state: 'on'
        brightness: 255
        hs_color: [217, 100]

  - id: '1771078366080'
    name: 'LR: Day Light'
    icon: mdi:shield-sun
    entities:
      light.living:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6500
      light.dining:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6500

  - id: '1771079390602'
    name: 'LR: Dim'
    icon: mdi:lightbulb-night
    entities:
      light.dining:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
      light.living:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
