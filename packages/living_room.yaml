automation:
  - id: '1771080638853'
    alias: 'LR: Auto Scene'
    description: >-
      Apply Day Light or Dim when a living-room light turns on or when
      ambient light crosses the is_dark hysteresis band, unless the TV
      is playing.
    use_blueprint:
      path: terminus/auto_scene.yaml
      input:
        lights:
          - light.lr_living
          - light.lr_dining
        dark_sensor: binary_sensor.lr_is_dark
        dim_scene: scene.lr_dim
        day_light_scene: scene.lr_day_light
        tv_players:
          - media_player.lr_tv
          - media_player.lr_tv_hub_cast

  - id: '1771090342172'
    alias: 'LR: TV Scene'
    description: >-
      Apply Redish when the TV powers on, or Dim when it powers off for
      30s. Only between sunset and sunrise. Dim branch is also gated by
      time<22:00 so night-walk keeps control after 22:00.
    triggers:
      - trigger: state
        entity_id:
          - media_player.lr_tv
          - media_player.lr_tv_hub_cast
        from: 'off'
        not_to:
          - 'unavailable'
          - 'unknown'
        id: tv_on
      - trigger: state
        entity_id:
          - media_player.lr_tv
          - media_player.lr_tv_hub_cast
        to: 'off'
        not_from:
          - 'unavailable'
          - 'unknown'
        for: '00:00:30'
        id: tv_off
    conditions:
      - condition: sun
        before: sunrise
        after: sunset
    actions:
      - choose:
          - conditions:
              - condition: trigger
                id: tv_on
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: scene.lr_redish
          - conditions:
              - condition: trigger
                id: tv_off
              - condition: time
                before: '22:00:00'
            sequence:
              - action: scene.turn_on
                target:
                  entity_id: scene.lr_dim
    mode: single

scene:
  - id: '1771077904382'
    name: 'LR: Redish'
    icon: mdi:fire-circle
    entities:
      light.lr_living:
        state: 'on'
        brightness: 255
        hs_color: [9, 100]
      light.lr_dining:
        state: 'on'
        brightness: 255
        hs_color: [9, 100]

  - id: '1771077995810'
    name: 'LR: Bluish'
    icon: mdi:shield-moon
    entities:
      light.lr_dining:
        state: 'on'
        brightness: 255
        hs_color: [217, 100]
      light.lr_living:
        state: 'on'
        brightness: 255
        hs_color: [217, 100]

  - id: '1771078366080'
    name: 'LR: Day Light'
    icon: mdi:shield-sun
    entities:
      light.lr_living:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6500
      light.lr_dining:
        state: 'on'
        brightness: 255
        color_temp_kelvin: 6500

  - id: '1771079390602'
    name: 'LR: Dim'
    icon: mdi:lightbulb-night
    entities:
      light.lr_dining:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
      light.lr_living:
        state: 'on'
        brightness: 76
        color_temp_kelvin: 2000
