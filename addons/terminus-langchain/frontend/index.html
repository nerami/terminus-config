<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Inject a <base href> for the served directory before any module loads, so
      Vite's relative asset URLs (base: "./") resolve correctly even on a deep
      browser-routed path like <dir>/<threadId>. The regex must match INGRESS_RE
      in src/runtime-config.ts (duplicated here because this runs before modules).
    -->
    <script>
      (function () {
        var m = location.pathname.match(/^.*?\/api\/hassio_ingress\/[^/]+\//);
        var dir = m ? m[0] : '/';
        var b = document.createElement('base');
        b.href = location.origin + dir;
        document.head.appendChild(b);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terminus LangChain</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
