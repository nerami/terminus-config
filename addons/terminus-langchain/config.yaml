name: Terminus
# Canonical add-on version — the ONLY version bumped on release. The frontend
# (package.json) and backend (pyproject.toml) versions are intentionally static
# ("0.0.0") to preserve Docker dependency-layer caching.
version: "0.13.0"
slug: terminus
description: Agent chat UI backed by a local LangChain/LangGraph agent (Anthropic).
arch:
  - aarch64
  - amd64
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:robot-happy
homeassistant_api: true
options:
  anthropic_api_key: ""
  model: claude-sonnet-4-6
  title_model: claude-haiku-4-5
  ha_url: ""
  ha_token: ""
  auto_run_tools: false
  rag_url: "http://local-terminus-rag:9000/mcp"
  rag_token: ""
  log_level: info
schema:
  anthropic_api_key: password
  model: str
  title_model: str
  ha_url: str?
  ha_token: password?
  auto_run_tools: bool
  rag_url: str?
  rag_token: password?
  log_level: list(debug|info|warning|error)?
boot: auto
startup: application
