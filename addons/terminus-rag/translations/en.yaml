configuration:
  api_token:
    name: API token
    description: >-
      Optional bearer token required on the MCP endpoint. When set, clients (the
      Terminus agent) must send it; leave blank to allow unauthenticated access
      on the internal add-on network. Changing this requires an add-on restart.
  refresh_interval:
    name: Index refresh interval (seconds)
    description: >-
      How often the knowledge index is rebuilt from the Home Assistant registry,
      in seconds. Default 600 (10 minutes). Lower values keep the index fresher
      at the cost of more frequent rebuilds.
  embed_model:
    name: Embedding model
    description: >-
      Sentence-embedding model used for semantic search (default
      BAAI/bge-small-en-v1.5). Changing it triggers a re-download and a full
      re-index on the next start.
  top_k_default:
    name: Default search results
    description: >-
      Number of results semantic search returns when a query does not specify
      its own limit. Default 10.
  log_level:
    name: Log level
    description: >-
      Verbosity of the add-on log. Use debug to troubleshoot, info for normal
      operation. Changing this requires an add-on restart.
  ha_url:
    name: Home Assistant URL (dev only)
    description: >-
      Development-only fallback for running the add-on outside Home Assistant.
      Ignored when installed as an add-on — the Supervisor connects to Core
      through its built-in proxy. Leave blank in normal installs.
  ha_token:
    name: Home Assistant token (dev only)
    description: >-
      Development-only long-lived access token paired with the dev URL above.
      Ignored when installed as an add-on. Leave blank in normal installs.
