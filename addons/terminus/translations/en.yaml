configuration:
  anthropic_api_key:
    name: Anthropic API key
    description: >-
      API key used by the chat agent and the chat-title generator. Required for
      the add-on to talk to Claude.
  model:
    name: Agent model
    description: >-
      Claude model the agent uses to answer (for example
      claude-sonnet-4-6).
  title_model:
    name: Title model
    description: >-
      Cheaper, faster Claude model used only to auto-generate short chat titles
      (for example claude-haiku-4-5). If no API key is set, titles fall back to a
      trimmed first message.
  ha_url:
    name: Home Assistant URL (dev only)
    description: >-
      Development-only fallback for running the add-on outside Home Assistant.
      Ignored when installed as an add-on — the Supervisor connects to Core
      through its built-in proxy. Leave blank in normal installs.
  ha_token:
    name: Home Assistant token (dev only)
    description: >-
      Development-only long-lived access token paired with the dev URL above.
      Ignored when installed as an add-on. Leave blank in normal installs.
  auto_run_tools:
    name: Auto-run home actions
    description: >-
      When enabled, scene and automation actions run without the manual approval
      prompt. Leave off to review each action before it changes your home.
  rag_url:
    name: Knowledge index URL (terminus-rag)
    description: >-
      MCP endpoint of the terminus-rag add-on that provides the home's
      searchable knowledge index (entities, scenes, automations, history).
      Defaults to the internal add-on host
      http://local-terminus-rag:9000/mcp. If terminus-rag is not installed or
      is unreachable, the agent runs in degraded mode (actuation and instance
      status still work). Changing this requires an add-on restart.
  rag_token:
    name: Knowledge index token (terminus-rag)
    description: >-
      Optional bearer token sent to terminus-rag when its api_token option is
      set. Leave blank when terminus-rag has no token configured. Changing this
      requires an add-on restart.
  log_level:
    name: Log level
    description: >-
      Verbosity of the add-on log. Use debug to troubleshoot, info for normal
      operation. Changing this requires an add-on restart.
  langfuse_tracing:
    name: Langfuse tracing
    description: >-
      When enabled, the agent sends LLM traces (prompts, tool calls, and
      responses) to a self-hosted Langfuse instance for debugging. Off by
      default. Tracing activates only when fully configured and pointed at a
      private-LAN address. Changing this requires an add-on restart.
  langfuse_public_key:
    name: Langfuse public key
    description: >-
      Project public key (pk-lf-…) from your Langfuse instance. Required when
      tracing is enabled.
  langfuse_secret_key:
    name: Langfuse secret key
    description: >-
      Project secret key (sk-lf-…) from your Langfuse instance. Required when
      tracing is enabled.
  langfuse_base_url:
    name: Langfuse base URL
    description: >-
      Base URL of your self-hosted Langfuse, for example
      http://192.168.100.176:63742. Must be a private-LAN or loopback IP — public
      hosts are refused so prompts and home state never leave your network.
